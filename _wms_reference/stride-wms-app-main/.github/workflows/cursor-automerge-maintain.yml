name: Cursor Auto-merge Maintain

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cursor-automerge-maintain
  cancel-in-progress: true

jobs:
  maintain:
    name: Keep cursor PRs updateable + auto-merge enabled
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Maintain PR(s)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          is_cursor_branch() {
            local ref="$1"
            [[ "$ref" == cursor/* ]]
          }

          prs=()
          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            prs+=("${PR_NUMBER}")
          else
            mapfile -t prs < <(gh pr list --repo "${REPO}" --state open --label automerge --json number,headRefName,isDraft --jq '.[] | select(.isDraft == false) | select(.headRefName | startswith("cursor/")) | .number' --limit 200)
          fi

          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No PRs to maintain."
            exit 0
          fi

          for pr in "${prs[@]}"; do
            echo "== Maintaining PR #${pr} =="

            head_ref="$(gh pr view "${pr}" --repo "${REPO}" --json headRefName --jq '.headRefName' || true)"
            is_draft="$(gh pr view "${pr}" --repo "${REPO}" --json isDraft --jq '.isDraft' || echo "false")"
            head_sha="$(gh pr view "${pr}" --repo "${REPO}" --json headRefOid --jq '.headRefOid' || true)"
            has_automerge="$(gh pr view "${pr}" --repo "${REPO}" --json labels --jq '[.labels[].name] | index(\"automerge\") != null' || echo "false")"

            if [ "${is_draft}" = "true" ]; then
              echo "PR #${pr} is draft; skip."
              continue
            fi
            if [ -z "${head_ref}" ] || ! is_cursor_branch "${head_ref}"; then
              echo "PR #${pr} head ref is not cursor/* (${head_ref}); skip."
              continue
            fi
            if [ "${has_automerge}" != "true" ]; then
              echo "PR #${pr} is missing 'automerge' label; skip."
              continue
            fi

            # Best-effort "Update branch" to keep it mergeable under strict protections.
            # If already up to date or cannot be updated due to conflicts, we ignore here;
            # the merge-conflict check workflow will surface conflicts explicitly.
            if [ -n "${head_sha}" ]; then
              gh api -X PUT "repos/${REPO}/pulls/${pr}/update-branch" -f expected_head_sha="${head_sha}" >/dev/null 2>&1 || true
            else
              gh api -X PUT "repos/${REPO}/pulls/${pr}/update-branch" >/dev/null 2>&1 || true
            fi

            # Re-assert auto-merge (idempotent).
            gh pr merge "${pr}" --repo "${REPO}" --auto --merge --delete-branch >/dev/null 2>&1 || true
          done

