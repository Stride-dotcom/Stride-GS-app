name: PR Merge Conflict Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-merge-conflict-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  merge-conflict-check:
    name: Check merge conflicts with base
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check for merge conflicts with base branch
        id: mergecheck
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_REF:-}" ]; then
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --prune origin "${BASE_REF}"

          set +e
          MERGE_OUTPUT="$(git merge --no-commit --no-ff "origin/${BASE_REF}" 2>&1)"
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            git merge --abort || true
            exit 0
          fi

          # Only mark as conflict when Git actually produced unmerged entries.
          # Some non-conflict merge failures can return non-zero without MERGE_HEAD.
          if [ -n "$(git ls-files -u)" ] || git rev-parse -q --verify MERGE_HEAD >/dev/null 2>&1; then
            files="$(git diff --name-only --diff-filter=U || true)"
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            {
              echo "conflict_files<<EOF"
              echo "${files}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            # Clean up merge attempt.
            git merge --abort || true
            exit 0
          fi

          echo "::warning::Merge simulation failed without conflict markers; treating as no-conflict."
          echo "${MERGE_OUTPUT}"
          echo "has_conflicts=false" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        env:
          HAS_CONFLICTS: ${{ steps.mergecheck.outputs.has_conflicts }}
          CONFLICT_FILES: ${{ steps.mergecheck.outputs.conflict_files }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          echo "## Merge conflict check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base branch: \`${BASE_REF}\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "${HAS_CONFLICTS}" = "true" ]; then
            echo "- Result: **CONFLICTS DETECTED**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Conflicting files:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${CONFLICT_FILES}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: **clean merge**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update PR comment + label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HAS_CONFLICTS: ${{ steps.mergecheck.outputs.has_conflicts }}
          CONFLICT_FILES: ${{ steps.mergecheck.outputs.conflict_files }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        with:
          script: |
            const hasConflicts = process.env.HAS_CONFLICTS === 'true';
            const baseRef = process.env.BASE_REF || '';
            const prNumber = Number(process.env.PR_NUMBER || '0');
            const prAuthor = process.env.PR_AUTHOR || '';
            const conflictFiles = (process.env.CONFLICT_FILES || '')
              .split(/\r?\n/)
              .map((s) => s.trim())
              .filter(Boolean);

            const marker = '<!-- pr-merge-conflict-check -->';
            const labelName = 'merge-conflict';
            const labelColor = 'b60205';

            async function ensureLabelExists() {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (e) {
                if (e.status !== 404) return;
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: labelColor,
                    description: 'PR cannot be merged cleanly; conflicts must be resolved.',
                  });
                } catch (createErr) {
                  // If label creation is blocked (permissions), ignore.
                }
              }
            }

            async function addLabel() {
              try {
                await ensureLabelExists();
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [labelName],
                });
              } catch (e) {
                // Ignore permission errors (fork PRs, etc.)
              }
            }

            async function removeLabel() {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: labelName,
                });
              } catch (e) {
                // Ignore if label missing or cannot remove.
              }
            }

            function buildBody({ includePing }) {
              if (hasConflicts) {
                const header = includePing && prAuthor ? `@${prAuthor} ` : '';
                const filesBlock = conflictFiles.length
                  ? conflictFiles.map((f) => `- \`${f}\``).join('\n')
                  : '- (unknown)';

                return [
                  marker,
                  `${header}This PR has **merge conflicts** with the base branch \`${baseRef}\`.`,
                  '',
                  'Conflicting files:',
                  filesBlock,
                  '',
                  'Fix by updating your branch with the latest base branch and resolving conflicts, then push.',
                  'This check will re-run automatically and remove the label once the conflicts are resolved.',
                ].join('\n');
              }

              return [
                marker,
                `No merge conflicts detected with base branch \`${baseRef}\`.`,
              ].join('\n');
            }

            // Upsert a single comment to avoid spamming.
            async function upsertComment() {
              let page = 1;
              let existing = null;
              while (true) {
                const res = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                  page,
                });
                const found = res.data.find((c) => (c.body || '').includes(marker));
                if (found) {
                  existing = found;
                  break;
                }
                if (res.data.length < 100) break;
                page += 1;
              }

              const body = existing
                ? buildBody({ includePing: false })
                : buildBody({ includePing: true });

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else if (hasConflicts) {
                // Only create a new comment when there are conflicts.
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            }

            // Do not attempt to write labels/comments on fork PRs (token perms are restricted).
            const isSameRepo = context.payload.pull_request?.head?.repo?.full_name === context.repo.owner + '/' + context.repo.repo;
            if (!isSameRepo) return;

            if (hasConflicts) {
              await addLabel();
            } else {
              await removeLabel();
            }

            await upsertComment();

      - name: Trigger auto-fix workflow for managed AI branch conflicts
        if: github.event_name == 'pull_request' && steps.mergecheck.outputs.has_conflicts == 'true' && github.event.pull_request.head.repo.full_name == github.repository && (startsWith(github.event.pull_request.head.ref, 'cursor/') || startsWith(github.event.pull_request.head.ref, 'claude/'))
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          echo "Dispatching Cursor Auto-fix Merge Conflicts for PR #${PR_NUMBER} (${HEAD_REF} -> ${BASE_REF})"
          if ! gh api -X POST "repos/${REPO}/actions/workflows/cursor-autofix-merge-conflicts.yml/dispatches" \
            -f ref=main \
            -f "inputs[pr_number]=${PR_NUMBER}" \
            -f "inputs[base_ref]=${BASE_REF}" \
            -f "inputs[head_ref]=${HEAD_REF}" \
            -f "inputs[head_repo]=${HEAD_REPO}"; then
            echo "::warning::Failed to dispatch auto-fix workflow. Manual run is still available."
          fi

      - name: Fail if merge conflicts exist
        if: steps.mergecheck.outputs.has_conflicts == 'true'
        run: |
          echo "::error::This PR has merge conflicts with the base branch."
          exit 1

  scheduled-auto-fix-dispatch:
    name: Scheduled scan for managed branch conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule'
    steps:
      - name: Dispatch auto-fix for conflicting managed AI PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t prs < <(gh pr list --repo "${REPO}" --state open --json number,isDraft,headRefName --jq '.[] | select(.isDraft == false) | select((.headRefName | startswith("cursor/")) or (.headRefName | startswith("claude/"))) | .number' --limit 200)
          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No managed open PRs to scan."
            exit 0
          fi

          for pr in "${prs[@]}"; do
            mergeable="$(gh pr view "${pr}" --repo "${REPO}" --json mergeable --jq '.mergeable' || echo "UNKNOWN")"
            merge_state="$(gh pr view "${pr}" --repo "${REPO}" --json mergeStateStatus --jq '.mergeStateStatus' || echo "UNKNOWN")"
            head_ref="$(gh pr view "${pr}" --repo "${REPO}" --json headRefName --jq '.headRefName' || true)"
            base_ref="$(gh pr view "${pr}" --repo "${REPO}" --json baseRefName --jq '.baseRefName' || true)"
            head_repo="$(gh pr view "${pr}" --repo "${REPO}" --json headRepositoryOwner,headRepository --jq '.headRepositoryOwner.login + \"/\" + .headRepository.name' || true)"

            echo "PR #${pr}: mergeable=${mergeable}, mergeStateStatus=${merge_state}, head=${head_ref}"
            if [ "${head_repo}" != "${REPO}" ]; then
              echo "  - Skip (fork PR)"
              continue
            fi

            if [ "${mergeable}" = "CONFLICTING" ] || [ "${merge_state}" = "DIRTY" ]; then
              echo "  - Dispatching auto-fix workflow"
              gh api -X POST "repos/${REPO}/actions/workflows/cursor-autofix-merge-conflicts.yml/dispatches" \
                -f ref=main \
                -f "inputs[pr_number]=${pr}" \
                -f "inputs[base_ref]=${base_ref}" \
                -f "inputs[head_ref]=${head_ref}" \
                -f "inputs[head_repo]=${head_repo}" >/dev/null
            else
              echo "  - Clean/no conflict"
            fi
          done

