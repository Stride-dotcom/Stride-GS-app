name: Lint Diff Guard

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-diff-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-diff:
    name: Lint changed lines only
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint guard (changed lines)
        env:
          LINT_GUARD_INCLUDE_WARNINGS: "true"
        run: |
          npm run lint:guard -- \
            --from "${{ github.event.before }}" \
            --to "${{ github.sha }}" \
            --base "origin/main"
