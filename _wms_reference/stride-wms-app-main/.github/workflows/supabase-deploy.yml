name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  # Auto-merge merges made by github-actions[bot] may not trigger `push` workflows.
  # This ensures deploy still runs immediately after a PR is merged into main.
  pull_request:
    branches:
      - main
    types: [closed]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  # Periodic "catch-up" run to apply any pending migrations even if
  # the original push-triggered deploy failed (no further commits needed).
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:
    inputs:
      run_db_push:
        description: "Run supabase db push"
        type: boolean
        required: false
        default: true
      deploy_functions:
        description: "Deploy changed Supabase functions"
        type: boolean
        required: false
        default: true
      deploy_mode:
        description: "Function deployment mode"
        type: choice
        required: false
        default: changed
        options:
          - changed
          - all

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: supabase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase migrations and functions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Pin the CLI wrapper version to avoid surprise breaking changes.
      SUPABASE_CLI_VERSION: "2.76.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # On PR-merged deploys, check out the commit that landed on main.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Supabase CLI (GitHub release)
        run: |
          set -euo pipefail
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) SUPABASE_ARCH="amd64" ;;
            aarch64|arm64) SUPABASE_ARCH="arm64" ;;
            *) echo "::error::Unsupported runner architecture: $ARCH"; exit 1 ;;
          esac

          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          TARBALL="supabase_${OS}_${SUPABASE_ARCH}.tar.gz"
          URL="https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/${TARBALL}"

          curl -fsSL "$URL" -o "$RUNNER_TEMP/$TARBALL"
          mkdir -p "$RUNNER_TEMP/supabase-bin"
          tar -xzf "$RUNNER_TEMP/$TARBALL" -C "$RUNNER_TEMP/supabase-bin"
          chmod +x "$RUNNER_TEMP/supabase-bin/supabase"
          echo "$RUNNER_TEMP/supabase-bin" >> "$GITHUB_PATH"

      - name: Prefer IPv4 connections
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      - name: Verify required secrets
        run: |
          MISSING=""
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING="$MISSING SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING="$MISSING SUPABASE_PROJECT_REF"
          [ -z "$SUPABASE_DB_PASSWORD" ] && MISSING="$MISSING SUPABASE_DB_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Actions secrets:$MISSING"
            echo "Set them in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Validate migration filenames (unique versions)
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, os, re, sys
          from collections import defaultdict
          
          files = glob.glob('supabase/migrations/*.sql')
          if not files:
            print("No supabase/migrations/*.sql files found.")
            sys.exit(0)
          
          bad = []
          by_ver = defaultdict(list)
          for f in files:
            base = os.path.basename(f)
            m = re.match(r'^(\d{14})_', base)
            if not m:
              bad.append(base)
              continue
            by_ver[m.group(1)].append(base)
          
          dups = {k: v for k, v in by_ver.items() if len(v) > 1}
          if bad:
            print("ERROR: migrations must start with 14-digit timestamp + underscore:")
            for b in sorted(bad):
              print("  -", b)
            sys.exit(1)
          
          if dups:
            print("ERROR: duplicate migration versions detected (prefix before first underscore):")
            for ver, names in sorted(dups.items()):
              print(ver)
              for n in sorted(names):
                print("  -", n)
            sys.exit(1)
          
          print(f"OK: {len(files)} migrations with unique versions")
          PY

      - name: Supabase CLI version
        run: supabase --version

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # ── Migration handling ─────────────────────────────────────────────
      # Instead of relying on git diff, we compare local migration files
      # against the remote database state via the Management API. This
      # self-heals from previous failed runs and catches any un-applied
      # migrations regardless of which commit introduced them.

      - name: Check pending migrations
        id: check_migrations
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_db_push }}" != "true" ]; then
            echo "should_migrate=false" >> "$GITHUB_OUTPUT"
            echo "pending_count=0" >> "$GITHUB_OUTPUT"
            {
              echo "pending_versions<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Migration push skipped (run_db_push=false)"
            exit 0
          fi

          # Fetch applied migration versions from the Management API (HTTPS, no direct DB)
          HTTP_RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/migrations" 2>/dev/null) || true

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Could not fetch remote migration list (HTTP $HTTP_CODE). Will attempt db push anyway."
            echo "should_migrate=true" >> "$GITHUB_OUTPUT"
            echo "api_available=false" >> "$GITHUB_OUTPUT"
            echo "pending_count=unknown" >> "$GITHUB_OUTPUT"
            {
              echo "pending_versions<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse remote versions
          if ! REMOTE_VERSIONS=$(echo "$RESPONSE_BODY" | node -e "
            let d='';
            process.stdin.on('data', c => d += c);
            process.stdin.on('end', () => {
              try {
                const rows = JSON.parse(d);
                if (!Array.isArray(rows)) throw new Error('Expected array response');
                rows.forEach(r => { if (r && r.version) console.log(r.version); });
              } catch(e) {
                process.stderr.write('Failed to parse API response\n');
                process.exit(1);
              }
            });
          "); then
            echo "::warning::Could not parse remote migration list. Will attempt db push anyway."
            echo "should_migrate=true" >> "$GITHUB_OUTPUT"
            echo "api_available=false" >> "$GITHUB_OUTPUT"
            echo "pending_count=unknown" >> "$GITHUB_OUTPUT"
            {
              echo "pending_versions<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "api_available=true" >> "$GITHUB_OUTPUT"

          # Collect local migration versions (timestamp prefix before first underscore)
          LOCAL_VERSIONS=$(ls -1 supabase/migrations/*.sql 2>/dev/null \
            | xargs -I{} basename {} \
            | sed 's/_.*//' \
            | sort -u)

          # Create stub files for remote-only migrations so db push doesn't
          # complain about missing local files. This replaces the old
          # "migration fetch --db-url" step that required a direct PostgreSQL
          # connection and was failing on IPv6-only GitHub runners.
          STUBS_CREATED=0
          while IFS= read -r ver; do
            [ -z "$ver" ] && continue
            if ! ls supabase/migrations/${ver}_* 1>/dev/null 2>&1; then
              echo "-- fetched from remote via API" > "supabase/migrations/${ver}_remote.sql"
              STUBS_CREATED=$((STUBS_CREATED + 1))
              echo "  stub: ${ver}_remote.sql"
            fi
          done <<< "$REMOTE_VERSIONS"

          if [ "$STUBS_CREATED" -gt 0 ]; then
            echo "Created $STUBS_CREATED stub(s) for remote-only migrations"
          fi

          # Find local migrations not yet applied to remote
          PENDING_VERSIONS=()
          while IFS= read -r ver; do
            [ -z "$ver" ] && continue
            if ! echo "$REMOTE_VERSIONS" | grep -q "^${ver}$"; then
              PENDING_VERSIONS+=("$ver")
              echo "  pending: $ver"
            fi
          done <<< "$LOCAL_VERSIONS"
          PENDING_COUNT="${#PENDING_VERSIONS[@]}"
          echo "pending_count=${PENDING_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "pending_versions<<EOF"
            if [ "$PENDING_COUNT" -gt 0 ]; then
              printf "%s\n" "${PENDING_VERSIONS[@]}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$PENDING_COUNT" -gt 0 ]; then
            echo "should_migrate=true" >> "$GITHUB_OUTPUT"
            echo "Found $PENDING_COUNT pending migration(s)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_migrate=true" >> "$GITHUB_OUTPUT"
            echo "No pending migrations detected, but running db push as requested"
          else
            echo "should_migrate=false" >> "$GITHUB_OUTPUT"
            echo "All local migrations are already applied"
          fi

      - name: Summarize migration plan
        env:
          SHOULD_MIGRATE: ${{ steps.check_migrations.outputs.should_migrate }}
          PENDING_COUNT: ${{ steps.check_migrations.outputs.pending_count }}
          PENDING_VERSIONS: ${{ steps.check_migrations.outputs.pending_versions }}
        run: |
          echo "## Migration Plan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${SHOULD_MIGRATE}" = "true" ]; then
            if [ "${PENDING_COUNT}" = "unknown" ]; then
              echo "Pending migrations: **unknown** (remote API unavailable)." >> "$GITHUB_STEP_SUMMARY"
              echo "db push will still run and apply any pending migrations it can reach." >> "$GITHUB_STEP_SUMMARY"
            elif [ "${PENDING_COUNT}" = "0" ]; then
              echo "Pending migrations: **0** (manual run can still force a db push)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Pending migrations detected: **${PENDING_COUNT}**" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$PENDING_VERSIONS" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Pending migrations: **0**" >> "$GITHUB_STEP_SUMMARY"
            echo "No db push will run on this invocation." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Apply database migrations
        id: apply_migrations
        if: steps.check_migrations.outputs.should_migrate == 'true'
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          LOG_FILE="$RUNNER_TEMP/supabase-db-push.log"
          : > "$LOG_FILE"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "── db push attempt $attempt of $MAX_RETRIES ──"
            set +e
            OUT="$(supabase db push --linked --yes -p "$SUPABASE_DB_PASSWORD" 2>&1)"
            rc=$?
            set -e
            echo "$OUT"
            {
              echo "----- attempt ${attempt}/${MAX_RETRIES}: db push -----"
              printf "%s\n" "$OUT"
              echo
            } >> "$LOG_FILE"

            if [ "$rc" -eq 0 ]; then
              echo "Migrations applied successfully"
              exit 0
            fi

            # If the remote migration history is missing older versions, the CLI refuses to
            # apply them by default and asks for --include-all. This often happens when the
            # migration history table is out-of-sync (restore/repair), even though the schema
            # is already current. Prefer repairing the history first *only* when the missing
            # set is large (likely a history reset). For small sets, --include-all is usually
            # the correct behavior (out-of-order merge) and should not be auto-repaired.
            if echo "$OUT" | grep -q "Rerun the command with --include-all flag"; then
              # Extract the out-of-order migration versions suggested by the CLI.
              # Strip ANSI sequences since the CLI may colorize output.
              VERSIONS_RAW="$(printf "%s\n" "$OUT" | python3 -c 'import re,sys; text=sys.stdin.read().replace("\r","\n"); text=re.sub(r"\x1b\[[0-9;]*m","",text); versions=sorted(set(re.findall(r"supabase/migrations/(\d{14})_", text))); print("\n".join(versions))')"

              if [ -n "$VERSIONS_RAW" ]; then
                mapfile -t VERSIONS <<< "$VERSIONS_RAW"

                # IMPORTANT: Prefer REPAIR over executing historical migrations.
                # Applying old, out-of-order migrations can be unsafe (schema may have evolved,
                # tables may have been dropped, etc.). Repairing the history table restores
                # consistency so NEW migrations can be applied safely.
                echo "::warning::Out-of-order migrations detected (${#VERSIONS[@]}). Repairing remote migration history as applied..."

                batch=()
                for v in "${VERSIONS[@]}"; do
                  [ -z "$v" ] && continue
                  batch+=("$v")
                  if [ "${#batch[@]}" -ge 50 ]; then
                    supabase migration repair "${batch[@]}" --status applied --linked -p "$SUPABASE_DB_PASSWORD" --yes
                    batch=()
                  fi
                done
                if [ "${#batch[@]}" -gt 0 ]; then
                  supabase migration repair "${batch[@]}" --status applied --linked -p "$SUPABASE_DB_PASSWORD" --yes
                fi

                echo "::warning::Retrying db push after migration repair"
                set +e
                OUT2="$(supabase db push --linked --yes -p "$SUPABASE_DB_PASSWORD" 2>&1)"
                rc2=$?
                set -e
                echo "$OUT2"
                {
                  echo "----- attempt ${attempt}/${MAX_RETRIES}: db push after repair -----"
                  printf "%s\n" "$OUT2"
                  echo
                } >> "$LOG_FILE"
                if [ "$rc2" -eq 0 ]; then
                  echo "Migrations applied successfully (after repair)"
                  exit 0
                fi
              else
                echo "::warning::Could not parse versions from include-all hint; skipping repair."
              fi

              echo "::warning::Skipping automatic --include-all execution (unsafe)."
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "::warning::db push failed on attempt $attempt. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "::error::db push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Diagnose failed db push
        if: failure() && steps.check_migrations.outputs.should_migrate == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PENDING_VERSIONS: ${{ steps.check_migrations.outputs.pending_versions }}
        run: |
          set -euo pipefail
          LOG_FILE="$RUNNER_TEMP/supabase-db-push.log"
          if [ ! -s "$LOG_FILE" ]; then
            echo "## Migration Failure Diagnostics" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Could not find captured db push logs for diagnostics." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 - <<'PY'
          import glob
          import json
          import os
          import re
          import subprocess
          import urllib.request
          from urllib.error import HTTPError, URLError
          
          log_file = os.path.join(os.environ.get("RUNNER_TEMP", "/tmp"), "supabase-db-push.log")
          with open(log_file, "r", encoding="utf-8", errors="replace") as fh:
            raw = fh.read()
          
          # Strip ANSI color codes for stable parsing.
          clean = re.sub(r"\x1b\[[0-9;]*m", "", raw)
          clean_lower = clean.lower()
          
          def git_first_line(args: list[str]) -> str:
            try:
              out = subprocess.check_output(["git", *args], text=True, stderr=subprocess.DEVNULL).strip()
              if not out:
                return ""
              return out.splitlines()[0]
            except Exception:
              return ""
          
          failure_type = "unknown"
          if (
            "password authentication failed" in clean_lower
            or "failed sasl auth" in clean_lower
            or "sqlstate 28p01" in clean_lower
          ):
            failure_type = "auth"
          elif "error: " in clean_lower:
            failure_type = "sql-or-runtime"
          
          migration_name = ""
          apply_hits = re.findall(r"Applying migration\s+([^\s]+\.sql)", clean)
          if apply_hits:
            migration_name = apply_hits[-1]
          
          sqlstate = ""
          error_message = ""
          for line in clean.splitlines():
            if "ERROR:" not in line:
              continue
            m = re.search(r"ERROR:\s*(.+?)(?:\s+\(SQLSTATE\s+([0-9A-Z]+)\))?\s*$", line.strip())
            if m:
              error_message = m.group(1).strip()
              sqlstate = (m.group(2) or "").strip()
          
          migration_path = ""
          if migration_name:
            if migration_name.startswith("supabase/migrations/"):
              migration_path = migration_name
            else:
              candidate = os.path.join("supabase", "migrations", migration_name)
              if os.path.exists(candidate):
                migration_path = candidate
              else:
                matches = glob.glob(os.path.join("supabase", "migrations", f"*_{migration_name}"))
                migration_path = matches[0] if matches else candidate
          
          intro_commit = ""
          intro_subject = ""
          if migration_path:
            intro_commit = git_first_line(["log", "--follow", "--diff-filter=A", "--format=%H", "--", migration_path])
            if not intro_commit:
              intro_commit = git_first_line(["log", "--follow", "--format=%H", "--", migration_path])
            if intro_commit:
              intro_subject = git_first_line(["show", "-s", "--format=%s", intro_commit])
          
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          token = os.environ.get("GITHUB_TOKEN", "")
          pr_number = ""
          pr_title = ""
          pr_url = ""
          pr_head_ref = ""
          pending_before = [v.strip() for v in os.environ.get("PENDING_VERSIONS", "").splitlines() if v.strip()]
          if repo and token and intro_commit:
            api_url = f"https://api.github.com/repos/{repo}/commits/{intro_commit}/pulls"
            req = urllib.request.Request(
              api_url,
              headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/vnd.github+json, application/vnd.github.groot-preview+json",
              },
            )
            try:
              with urllib.request.urlopen(req, timeout=12) as resp:
                data = json.loads(resp.read().decode("utf-8"))
              if isinstance(data, list) and data:
                pr = data[0]
                pr_number = str(pr.get("number") or "")
                pr_title = pr.get("title") or ""
                pr_url = pr.get("html_url") or ""
                pr_head_ref = ((pr.get("head") or {}).get("ref")) or ""
            except (HTTPError, URLError, TimeoutError, ValueError):
              pass
          
          # Best-effort check for what remains pending right now.
          pending_now = []
          remote_count = ""
          try:
            project_ref = os.environ.get("SUPABASE_PROJECT_REF", "")
            access_token = os.environ.get("SUPABASE_ACCESS_TOKEN", "")
            if project_ref and access_token:
              req = urllib.request.Request(
                f"https://api.supabase.com/v1/projects/{project_ref}/database/migrations",
                headers={"Authorization": f"Bearer {access_token}"},
              )
              with urllib.request.urlopen(req, timeout=12) as resp:
                rows = json.loads(resp.read().decode("utf-8"))
              if isinstance(rows, list):
                remote_versions = {str(r.get("version")) for r in rows if isinstance(r, dict) and r.get("version")}
                local_versions = {
                  os.path.basename(p).split("_", 1)[0]
                  for p in glob.glob("supabase/migrations/*.sql")
                  if re.match(r"^\d{14}_", os.path.basename(p))
                }
                pending_now = sorted(v for v in local_versions if v not in remote_versions)
                remote_count = str(len(remote_versions))
          except (HTTPError, URLError, TimeoutError, ValueError, OSError):
            pass
          
          summary_lines = []
          summary_lines.append("## Migration Failure Diagnostics")
          summary_lines.append("")
          
          if failure_type == "auth":
            summary_lines.append("- Failure type: **Database authentication/connectivity**")
          elif failure_type == "sql-or-runtime":
            summary_lines.append("- Failure type: **SQL/runtime while applying migrations**")
          else:
            summary_lines.append("- Failure type: **Unknown (see db push logs)**")
          
          if migration_name:
            summary_lines.append(f"- Failing migration: `{migration_name}`")
          if sqlstate:
            summary_lines.append(f"- SQLSTATE: `{sqlstate}`")
          if error_message:
            summary_lines.append(f"- Error: `{error_message}`")
          if pending_before:
            summary_lines.append(f"- Pending versions before db push: `{', '.join(pending_before)}`")
          if remote_count:
            summary_lines.append(f"- Remote applied migration count (API): **{remote_count}**")
          if pending_now:
            summary_lines.append(f"- Pending versions after failure: `{', '.join(pending_now)}`")
          
          if intro_commit and repo:
            short = intro_commit[:12]
            commit_url = f"https://github.com/{repo}/commit/{intro_commit}"
            summary_lines.append(f"- Migration introduced by commit: [`{short}`]({commit_url})")
            if intro_subject:
              summary_lines.append(f"  - Commit subject: {intro_subject}")
          
          if pr_number:
            summary_lines.append(f"- Source PR: [#{pr_number}]({pr_url})")
            if pr_title:
              summary_lines.append(f"  - PR title: {pr_title}")
            if pr_head_ref:
              summary_lines.append(f"  - Source branch: `{pr_head_ref}`")
          
          summary_lines.append("")
          if failure_type == "auth":
            summary_lines.append("### Next action")
            summary_lines.append("- This is **not** a SQL migration bug.")
            summary_lines.append("- Update the `SUPABASE_DB_PASSWORD` GitHub Actions secret to match the current database password, then re-run **Supabase Deploy**.")
            if pending_now:
              summary_lines.append(f"- Migrations currently blocked by auth failure: `{', '.join(pending_now)}`")
            elif pending_before:
              summary_lines.append(f"- Migrations likely blocked by auth failure: `{', '.join(pending_before)}`")
          else:
            summary_lines.append("### Next action")
            summary_lines.append("- Any branch (cursor/claude/human) can fix the migration.")
            summary_lines.append("- Prefer a **new migration** that repairs forward when possible; then merge and re-run **Supabase Deploy**.")
          
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as sf:
            sf.write("\n".join(summary_lines) + "\n")
          
          pending_for_alert = pending_now or pending_before
          pending_label = ", ".join(pending_for_alert[:8]) if pending_for_alert else "n/a"
          diag = f"type={failure_type}, migration={migration_name or 'n/a'}, sqlstate={sqlstate or 'n/a'}, pending={pending_label}"
          print(f"::error::Supabase db push failed ({diag})")
          PY

      - name: Verify migration status
        if: steps.check_migrations.outputs.should_migrate == 'true'
        run: |
          echo "## Migration Status" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY'
          import glob
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.request
          from urllib.error import HTTPError, URLError
          
          summary = os.environ["GITHUB_STEP_SUMMARY"]
          project_ref = os.environ.get("SUPABASE_PROJECT_REF", "")
          access_token = os.environ.get("SUPABASE_ACCESS_TOKEN", "")
          local_versions = {
            os.path.basename(p).split("_", 1)[0]
            for p in glob.glob("supabase/migrations/*.sql")
            if re.match(r"^\d{14}_", os.path.basename(p))
          }

          remote_versions = None
          verify_source = None
          api_error = None

          if project_ref and access_token:
            try:
              req = urllib.request.Request(
                f"https://api.supabase.com/v1/projects/{project_ref}/database/migrations",
                headers={"Authorization": f"Bearer {access_token}"},
              )
              with urllib.request.urlopen(req, timeout=12) as resp:
                rows = json.loads(resp.read().decode("utf-8"))
              if isinstance(rows, list):
                remote_versions = {str(r.get("version")) for r in rows if isinstance(r, dict) and r.get("version")}
                verify_source = "Supabase Management API"
              else:
                api_error = "Unexpected API response shape"
            except (HTTPError, URLError, TimeoutError, ValueError) as exc:
              api_error = str(exc)
          else:
            api_error = "missing API credentials in workflow env"

          # Fallback for API permission issues (e.g., intermittent 403): parse CLI migration list output.
          if remote_versions is None:
            try:
              cmd = [
                "supabase",
                "migration",
                "list",
                "--linked",
                "-p",
                os.environ.get("SUPABASE_DB_PASSWORD", ""),
              ]
              cp = subprocess.run(cmd, check=False, capture_output=True, text=True)
              combined = (cp.stdout or "") + "\n" + (cp.stderr or "")
              parsed_remote = set()
              for line in combined.splitlines():
                if "|" not in line:
                  continue
                parts = [p.strip() for p in line.split("|")]
                if len(parts) < 2:
                  continue
                # Format is usually: local_version | remote_version | timestamp
                remote_col = parts[1]
                if re.fullmatch(r"\d{14}", remote_col):
                  parsed_remote.add(remote_col)
              if parsed_remote:
                remote_versions = parsed_remote
                verify_source = "Supabase CLI migration list fallback"
              else:
                raise RuntimeError("could not parse remote migration versions from CLI output")
            except Exception as cli_exc:
              with open(summary, "a", encoding="utf-8") as sf:
                if api_error:
                  sf.write(f"- Could not verify via API after push ({api_error}).\n")
                sf.write(f"- Could not verify via CLI fallback ({cli_exc}).\n")
              print(f"::warning::Could not verify migration status via API ({api_error}) or CLI fallback ({cli_exc})")
              sys.exit(0)

          pending_after = sorted(v for v in local_versions if v not in remote_versions)
          
          with open(summary, "a", encoding="utf-8") as sf:
            if api_error:
              sf.write(f"- API verify unavailable ({api_error}); used **{verify_source}**.\n")
            else:
              sf.write(f"- Verified via **{verify_source}**.\n")
            sf.write(f"- Remote has **{len(remote_versions)}** applied migrations after this run.\n")
            sf.write(f"- Pending local migrations after this run: **{len(pending_after)}**\n")
            if pending_after:
              sf.write("  - Remaining versions: `" + ", ".join(pending_after) + "`\n")
          
          if pending_after:
            print("::error::Pending migrations remain unapplied after db push: " + ", ".join(pending_after))
            sys.exit(1)
          PY

          # Also show CLI-based migration list for detailed view
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ( set -o pipefail; supabase migration list --linked -p "$SUPABASE_DB_PASSWORD" 2>&1 | tail -20 ) >> "$GITHUB_STEP_SUMMARY" \
            || echo "(migration list unavailable)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: No database migrations needed
        if: steps.check_migrations.outputs.should_migrate != 'true'
        run: |
          echo "No pending migrations to apply."
          echo "## Migrations" >> "$GITHUB_STEP_SUMMARY"
          echo "All migrations already applied. Nothing to do." >> "$GITHUB_STEP_SUMMARY"

      # ── Function deployment ────────────────────────────────────────────

      - name: Detect functions to deploy
        id: detect_functions
        if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.deploy_functions == true || inputs.deploy_functions == 'true'))
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_mode }}" = "all" ]; then
            shopt -s nullglob
            mapfile -t FUNCTIONS < <(
              for d in supabase/functions/*/; do
                FUNCTION_NAME="$(basename "$d")"
                case "$FUNCTION_NAME" in
                  _*) continue ;;
                esac
                printf "%s\n" "$FUNCTION_NAME"
              done | sort -u
            )
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              # We check out the merge commit that landed on main; diff against its first parent.
              BEFORE_SHA="$(git rev-parse HEAD^1)"
              AFTER_SHA="$(git rev-parse HEAD)"
            else
              BEFORE_SHA="${{ github.event.before }}"
              if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
                BEFORE_SHA="$(git rev-parse HEAD~1)"
              fi
              AFTER_SHA="${{ github.sha }}"
            fi

            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"

            if echo "$CHANGED_FILES" | grep -q '^supabase/functions/_shared/'; then
              shopt -s nullglob
              mapfile -t FUNCTIONS < <(
                for d in supabase/functions/*/; do
                  FUNCTION_NAME="$(basename "$d")"
                  case "$FUNCTION_NAME" in
                    _*) continue ;;
                  esac
                  printf "%s\n" "$FUNCTION_NAME"
                done | sort -u
              )
            else
              mapfile -t FUNCTIONS < <(echo "$CHANGED_FILES" | awk -F/ '/^supabase\/functions\/[^/]+\// { if ($3 !~ /^_/) print $3 }' | sort -u)
            fi
          fi

          if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
            echo "function_list=" >> "$GITHUB_OUTPUT"
            echo "No functions selected for deploy."
            exit 0
          fi

          {
            echo "function_list<<EOF"
            printf "%s\n" "${FUNCTIONS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Supabase functions
        if: (github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.deploy_functions == true || inputs.deploy_functions == 'true'))) && steps.detect_functions.outputs.function_list != ''
        env:
          FUNCTION_LIST: ${{ steps.detect_functions.outputs.function_list }}
        run: |
          echo "Deploying functions:"
          echo "$FUNCTION_LIST"
          echo "## Functions Deployed" >> "$GITHUB_STEP_SUMMARY"
          FAILED=""
          while IFS= read -r FUNCTION_NAME; do
            [ -z "$FUNCTION_NAME" ] && continue
            if supabase functions deploy "$FUNCTION_NAME" --project-ref "$SUPABASE_PROJECT_REF"; then
              echo "- $FUNCTION_NAME" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::Failed to deploy function: $FUNCTION_NAME"
              echo "- ~~$FUNCTION_NAME~~ (failed)" >> "$GITHUB_STEP_SUMMARY"
              FAILED="$FAILED $FUNCTION_NAME"
            fi
          done <<< "$FUNCTION_LIST"
          if [ -n "$FAILED" ]; then
            echo "::error::Some functions failed to deploy:$FAILED"
            exit 1
          fi

      - name: No function deployment needed
        if: (github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.deploy_functions == true || inputs.deploy_functions == 'true'))) && steps.detect_functions.outputs.function_list == ''
        run: echo "No changed functions detected."
