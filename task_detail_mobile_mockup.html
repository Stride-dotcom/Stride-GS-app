<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Task Detail — Mobile Mockup v2</title>
  <style>
    :root {
      --bg: #F5F2EE;
      --card: #FFFFFF;
      --dark: #1C1C1C;
      --orange: #E8692A;
      --orange-deep: #C95518;
      --orange-soft: #FFF3EC;
      --orange-border: #F8CFBA;
      --text: #151515;
      --text-muted: #888;
      --border: #E5DFD8;
      --green: #16A34A;
      --green-soft: #F0FDF4;
      --red: #DC2626;
      --red-soft: #FEF2F2;
      --blue: #2563EB;
      --blue-soft: #EFF6FF;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 24px 0;
      min-height: 100vh;
      flex-wrap: wrap;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 4px #333, 0 0 0 6px #555, 0 20px 60px rgba(0,0,0,0.5);
    }

    .status-bar {
      height: 54px;
      background: var(--dark);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ─── CURRENT header ─── */
    .before .header {
      background: var(--dark);
      color: #fff;
      padding: 12px 16px 14px;
      flex-shrink: 0;
    }
    .before .header .back-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .before .header .back-btn {
      color: var(--orange); font-size: 14px; font-weight: 600;
      background: none; border: none; cursor: pointer;
    }
    .before .header .item-id {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .before .header .info-icon {
      width: 20px; height: 20px; background: var(--orange); border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-bottom: 6px;
    }
    .before .header .badges { display: flex; gap: 6px; margin-bottom: 6px; }
    .before .header .badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .before .badge.inspection { background: #DC2626; color: #fff; }
    .before .badge.open { background: #2563EB; color: #fff; }
    .before .badge.progress { background: var(--orange); color: #fff; }
    .before .header .client {
      font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.3;
    }

    /* ─── REDESIGNED header ─── */
    .after .header {
      background: var(--dark);
      color: #fff;
      padding: 6px 16px 8px;
      flex-shrink: 0;
    }
    .after .header .top-row {
      display: flex; align-items: center; gap: 8px;
    }
    .after .header .close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .after .header .item-id {
      font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
    }
    .after .header .client-inline {
      font-size: 11px; color: rgba(255,255,255,0.45);
      margin-left: 2px; font-weight: 500;
    }
    .after .header .badges {
      display: flex; gap: 5px; margin-left: auto;
    }
    .after .header .badge {
      font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .after .badge.inspection { background: #DC2626; color: #fff; }
    .after .badge.open { background: #2563EB; color: #fff; }
    .after .badge.progress { background: var(--orange); color: #fff; }
    .after .badge.completed { background: var(--green); color: #fff; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
    }
    .tab-bar button {
      flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600;
      color: var(--text-muted); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit;
    }
    .tab-bar button.active {
      color: var(--orange); border-bottom-color: var(--orange);
    }

    /* Content */
    .content {
      flex: 1; overflow-y: auto; background: var(--bg); padding: 12px 14px;
    }
    .content-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px; margin-bottom: 10px; border: 1px solid var(--border);
    }
    .content-card h3 {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .detail-row {
      display: flex; justify-content: space-between; padding: 7px 0;
      border-bottom: 1px solid #f0ece6; font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label { color: var(--text-muted); }
    .detail-row .value { font-weight: 600; color: var(--text); text-align: right; }
    .empty-state {
      text-align: center; padding: 32px 16px;
      color: var(--text-muted); font-size: 13px;
    }

    /* Photo grid placeholder */
    .photo-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px;
    }
    .photo-placeholder {
      aspect-ratio: 1; background: #e8e2da; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 11px;
    }
    .photo-placeholder.add {
      border: 2px dashed var(--border); background: transparent;
      color: var(--orange); font-size: 24px; font-weight: 300;
    }

    /* ─── CURRENT footer ─── */
    .before .footer {
      flex-shrink: 0; background: var(--card);
      border-top: 1px solid var(--border); padding: 10px 14px 34px;
    }
    .before .footer .start-btn {
      width: 100%; padding: 16px; font-size: 16px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase; background: var(--green);
      color: #fff; border: none; border-radius: 12px; cursor: pointer;
      font-family: inherit; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .before .footer .result-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .before .footer .result-btn {
      flex: 1; padding: 14px; font-size: 13px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .before .result-btn.pass { background: var(--green-soft); color: var(--green); border: 1.5px solid #bbf7d0; }
    .before .result-btn.fail { background: var(--red-soft); color: var(--red); border: 1.5px solid #fecaca; }
    .before .footer .cancel {
      width: 100%; text-align: center; padding: 8px; font-size: 12px;
      color: var(--text-muted); background: none; border: none; cursor: pointer;
      font-family: inherit;
    }

    /* ─── REDESIGNED footer ─── */
    .after .footer {
      flex-shrink: 0; background: var(--card);
      border-top: 1px solid var(--border); padding: 8px 14px 34px;
    }
    .after .action-bar {
      display: flex; gap: 8px; align-items: center;
    }
    .after .action-bar .primary-btn {
      flex: 1; padding: 12px 16px; font-size: 14px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .after .action-bar .primary-btn.start { background: var(--green); color: #fff; }
    .after .action-bar .more-btn {
      width: 44px; height: 44px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--card);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-muted); flex-shrink: 0;
    }
    .after .split-actions {
      display: flex; gap: 8px; align-items: center;
    }
    .after .split-actions .split-btn {
      flex: 1; padding: 12px 8px; font-size: 13px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .after .split-btn.pass { background: var(--green); color: #fff; }
    .after .split-btn.fail { background: var(--red-soft); color: var(--red); border: 1.5px solid #fecaca; }
    .after .split-btn.stop { background: #FEF3C7; color: #92400E; border: 1.5px solid #FDE68A; }
    .after .completed-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; background: var(--green-soft); border-radius: 12px;
      border: 1.5px solid #bbf7d0; font-size: 13px; font-weight: 700; color: var(--green);
    }

    /* Labels */
    .phone-label {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; padding: 3px 12px; border-radius: 20px; z-index: 10;
    }
    .before .phone-label { background: #DC2626; color: #fff; }
    .after .phone-label { background: var(--green); color: #fff; }

    /* Measurement annotations */
    .measure {
      position: absolute; right: -60px; font-size: 10px; font-weight: 700;
      color: #ff6b6b; display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .measure.green { color: #4ade80; }
    .measure-line {
      width: 20px; height: 1px; background: currentColor;
    }

    /* Switcher */
    .switcher {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 100;
      background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    .switcher button {
      padding: 8px 14px; font-size: 11px; font-weight: 700; border: none;
      border-radius: 10px; cursor: pointer; font-family: inherit; color: #fff;
    }
    .switcher button.active-sw { box-shadow: 0 0 0 2px var(--orange); }
    .switcher .sep {
      width: 1px; background: rgba(255,255,255,0.15); margin: 0 4px;
    }
  </style>
</head>
<body>

  <!-- ════════ CURRENT ════════ -->
  <div class="phone before" id="phone-before">
    <div class="phone-label">Current</div>
    <div class="status-bar">
      <span>6:16</span>
      <span style="font-size:12px">●●● WiFi 🔋</span>
    </div>

    <div class="header">
      <div class="back-row">
        <button class="back-btn">‹ Back</button>
      </div>
      <div class="item-id">62799-1</div>
      <div class="info-icon">i</div>
      <div class="badges">
        <span class="badge inspection">Inspection</span>
        <span class="badge" id="before-status-badge">Open</span>
      </div>
      <div class="client">Short Term Client<br>Holding Account</div>
    </div>

    <div class="tab-bar">
      <button>Details</button>
      <button class="active">Photos</button>
      <button>Docs</button>
      <button>Notes</button>
      <button>Act.</button>
    </div>

    <div class="content" id="before-content">
      <div class="empty-state">No photos yet.</div>
    </div>

    <div class="footer" id="before-footer"></div>
  </div>

  <!-- ════════ REDESIGNED ════════ -->
  <div class="phone after" id="phone-after">
    <div class="phone-label">Redesign</div>
    <div class="status-bar">
      <span>6:16</span>
      <span style="font-size:12px">●●● WiFi 🔋</span>
    </div>

    <div class="header">
      <div class="top-row">
        <button class="close-btn">✕</button>
        <span class="item-id">62799-1</span>
        <span class="client-inline">· Short Term Client</span>
        <div class="badges">
          <span class="badge inspection">Inspection</span>
          <span class="badge" id="after-status-badge">Open</span>
        </div>
      </div>
    </div>

    <div class="tab-bar" id="after-tabs">
      <button class="active" onclick="switchTab('details')">Details</button>
      <button onclick="switchTab('photos')">Photos</button>
      <button onclick="switchTab('docs')">Docs</button>
      <button onclick="switchTab('notes')">Notes</button>
      <button onclick="switchTab('activity')">Activity</button>
    </div>

    <div class="content" id="after-content"></div>

    <div class="footer" id="after-footer"></div>
  </div>

  <!-- Bottom switcher -->
  <div class="switcher">
    <button id="state-open" style="background:#2563EB" class="active-sw" onclick="setState('open')">Open</button>
    <button id="state-progress" style="background:#E8692A" onclick="setState('progress')">In Progress</button>
    <button id="state-done" style="background:#16A34A" onclick="setState('done')">Completed</button>
  </div>

  <script>
    let currentState = 'open';
    let currentTab = 'details';

    function setState(state) {
      currentState = state;
      document.querySelectorAll('.switcher button').forEach(b => b.classList.remove('active-sw'));
      document.getElementById('state-' + state).classList.add('active-sw');
      render();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('#after-tabs button').forEach((b, i) => {
        b.classList.toggle('active', ['details','photos','docs','notes','activity'][i] === tab);
      });
      renderAfterContent();
    }

    function renderAfterContent() {
      const c = document.getElementById('after-content');
      if (currentTab === 'details') {
        c.innerHTML = `
          <div class="content-card">
            <div class="detail-row"><span class="label">Type</span><span class="value">Inspection</span></div>
            <div class="detail-row"><span class="label">Item</span><span class="value">62799-1</span></div>
            <div class="detail-row"><span class="label">Location</span><span class="value">A-12-3</span></div>
            <div class="detail-row"><span class="label">Vendor</span><span class="value">Restoration Hardware</span></div>
            <div class="detail-row"><span class="label">Description</span><span class="value">Sofa, 3-seat sectional</span></div>
            <div class="detail-row"><span class="label">Class</span><span class="value">Large</span></div>
            <div class="detail-row"><span class="label">Sidemark</span><span class="value">Henderson Project</span></div>
            <div class="detail-row"><span class="label">Shipment</span><span class="value" style="color:var(--blue)">SHP-062799</span></div>
            <div class="detail-row"><span class="label">Due</span><span class="value" style="color:#DC2626">Apr 22 (tomorrow)</span></div>
            <div class="detail-row"><span class="label">Priority</span><span class="value">Normal</span></div>
            <div class="detail-row"><span class="label">Created</span><span class="value">Apr 20, 2026</span></div>
            <div class="detail-row"><span class="label">Assigned</span><span class="value">—</span></div>
          </div>
        `;
      } else if (currentTab === 'photos') {
        c.innerHTML = `
          <div style="padding:8px 0">
            <div class="photo-grid">
              <div class="photo-placeholder" style="background:#d4cfc7">📷</div>
              <div class="photo-placeholder" style="background:#cdc7bf">📷</div>
              <div class="photo-placeholder" style="background:#c5bfb7">📷</div>
              <div class="photo-placeholder add">+</div>
            </div>
            <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text-muted)">Tap + or use camera to add photos</div>
          </div>
        `;
      } else if (currentTab === 'docs') {
        c.innerHTML = '<div class="empty-state">No documents yet.</div>';
      } else if (currentTab === 'notes') {
        c.innerHTML = `
          <div style="padding:8px 0">
            <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:12px">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">JS</div>
              <div>
                <div style="font-size:12px;font-weight:600">Justin <span style="color:var(--text-muted);font-weight:400;font-size:10px">· 2h ago</span></div>
                <div style="font-size:13px;margin-top:2px;color:var(--text)">Check for damage on bottom left leg</div>
              </div>
            </div>
            <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;gap:8px;align-items:center">
              <input placeholder="Add a note..." style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fafaf8;outline:none">
              <button style="width:36px;height:36px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:14px;cursor:pointer">↑</button>
            </div>
          </div>
        `;
      } else {
        c.innerHTML = `
          <div style="padding:8px 0;font-size:12px;color:var(--text-muted)">
            <div style="padding:8px 0;border-bottom:1px solid #f0ece6">
              <span style="color:var(--text);font-weight:600">Task created</span> · Apr 20, 10:30 AM
            </div>
            <div style="padding:8px 0;border-bottom:1px solid #f0ece6">
              <span style="color:var(--text);font-weight:600">Due date set</span> · Apr 22 · by system (SLA: 48hr)
            </div>
          </div>
        `;
      }
    }

    function render() {
      // ── Badges ──
      const bb = document.getElementById('before-status-badge');
      const ab = document.getElementById('after-status-badge');
      if (currentState === 'open') {
        bb.textContent = 'Open'; bb.className = 'badge open'; bb.style.background = '';
        ab.textContent = 'Open'; ab.className = 'badge open';
      } else if (currentState === 'progress') {
        bb.textContent = 'In Progress'; bb.className = 'badge progress'; bb.style.background = '';
        ab.textContent = 'In Progress'; ab.className = 'badge progress';
      } else {
        bb.textContent = 'Completed'; bb.className = 'badge open'; bb.style.background = '#16A34A';
        ab.textContent = 'Passed'; ab.className = 'badge completed';
      }

      // ── Before footer (always shows everything) ──
      const bf = document.getElementById('before-footer');
      if (currentState === 'open') {
        bf.innerHTML = `
          <button class="start-btn">▶  START TASK</button>
          <div class="result-row">
            <button class="result-btn pass">✓ PASS</button>
            <button class="result-btn fail">✗ FAIL</button>
          </div>
          <button class="cancel">Cancel Task</button>
        `;
      } else if (currentState === 'progress') {
        bf.innerHTML = `
          <button class="start-btn" style="background:#F59E0B;color:#78350F">⏹  STOP TASK</button>
          <div class="result-row">
            <button class="result-btn pass">✓ PASS</button>
            <button class="result-btn fail">✗ FAIL</button>
          </div>
          <button class="cancel">Cancel Task</button>
        `;
      } else {
        bf.innerHTML = `
          <div style="text-align:center;padding:12px;color:#16A34A;font-weight:700;font-size:14px">
            ✓ Task Completed — Passed
          </div>
        `;
      }

      // ── After footer (state-aware) ──
      const af = document.getElementById('after-footer');
      if (currentState === 'open') {
        af.innerHTML = `
          <div class="action-bar">
            <button class="primary-btn start" style="background:var(--green);color:#fff">▶  Start Task</button>
            <button class="more-btn">⋯</button>
          </div>
        `;
      } else if (currentState === 'progress') {
        af.innerHTML = `
          <div class="split-actions">
            <button class="split-btn pass">✓ Pass</button>
            <button class="split-btn fail">✗ Fail</button>
            <button class="split-btn stop">⏸ Pause</button>
            <button class="more-btn" style="width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-muted);flex-shrink:0">⋯</button>
          </div>
        `;
      } else {
        af.innerHTML = `
          <div class="completed-bar">✓ Passed · Completed Apr 21, 2026</div>
        `;
      }

      renderAfterContent();
    }

    // Init
    render();
  </script>
</body>
</html>
