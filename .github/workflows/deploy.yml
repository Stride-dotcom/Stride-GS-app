name: Deploy to GitHub Pages

on:
  push:
    branches: [source]
    paths: ['stride-gs-app/**']

# GITHUB_TOKEN needs write access to push the built bundle to origin/main
permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so peaceiris can create the orphan commit cleanly
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: stride-gs-app/package-lock.json

      - name: Install dependencies
        working-directory: stride-gs-app
        run: npm ci

      - name: TypeScript check
        working-directory: stride-gs-app
        run: npx tsc -b

      - name: Build (verify-entry → tsc → vite → sanity checks)
        working-directory: stride-gs-app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify dist output
        run: |
          test -f stride-gs-app/dist/index.html \
            || { echo "❌ dist/index.html missing"; exit 1; }
          test -d stride-gs-app/dist/assets \
            || { echo "❌ dist/assets/ missing"; exit 1; }
          JS=$(ls stride-gs-app/dist/assets/*.js 2>/dev/null | wc -l)
          [ "$JS" -gt 0 ] \
            || { echo "❌ No JS bundle found in dist/assets/"; exit 1; }
          echo "✓ dist verified (index.html + $JS JS bundle(s))"

      - name: Deploy to origin/main (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: stride-gs-app/dist
          publish_branch: main
          force_orphan: true
          cname: mystridehub.com
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"
